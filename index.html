<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>ハートワーク 配車管理</title>
  <style>
    :root {
      --bg: #f0f2f5;
      --panel: #fff;
      --ink: #1d2935;
      --muted: #647484;
      --line: #cfd8e3;
      --line-soft: #e7ecf2;
      --blue: #1877f2;
      --blue-soft: #e7f3ff;
      --green: #12805c;
      --red: #c93445;
      --amber: #a96800;
      --row: #f7f8fa;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      background: var(--bg);
      color: var(--ink);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      font-size: 14px;
      line-height: 1.45;
    }

    button, input, select { font: inherit; }
    button { cursor: pointer; }

    .app {
      min-height: 100vh;
      display: grid;
      grid-template-columns: 292px minmax(0, 1fr);
    }

    .sidebar {
      background: #fff;
      border-right: 1px solid var(--line);
      padding: 12px 8px;
    }

    .brand {
      padding: 0 8px 12px;
      border-bottom: 1px solid var(--line-soft);
      margin-bottom: 12px;
    }

    .brand .mark {
      color: var(--blue);
      font-weight: 800;
      margin-bottom: 6px;
    }

    .brand h1 {
      margin: 0;
      font-size: 26px;
      line-height: 1.15;
      letter-spacing: 0;
    }

    .nav {
      display: grid;
      gap: 2px;
    }

    .nav button {
      min-height: 42px;
      border: 0;
      border-radius: 6px;
      background: transparent;
      display: grid;
      grid-template-columns: 24px minmax(0, 1fr) auto;
      gap: 8px;
      align-items: center;
      padding: 0 10px;
      color: var(--ink);
      font-weight: 650;
      text-align: left;
    }

    .nav button.active {
      background: #e7f0fb;
      color: #1264bf;
    }

    .badge {
      min-width: 22px;
      height: 22px;
      border-radius: 999px;
      display: grid;
      place-items: center;
      background: #b10f25;
      color: #fff;
      font-size: 11px;
      font-weight: 800;
    }

    .workspace {
      min-width: 0;
      display: grid;
      grid-template-rows: auto auto minmax(0, 1fr);
    }

    .topbar {
      min-height: 58px;
      background: #f6f4fb;
      border-bottom: 1px solid var(--line);
      display: grid;
      grid-template-columns: 310px minmax(0, 1fr) auto;
      gap: 14px;
      align-items: center;
      padding: 8px 12px;
    }

    .selectbox,
    .tool,
    .primary {
      min-height: 38px;
      border-radius: 5px;
      border: 1px solid #aebdcc;
      background: #fff;
      color: var(--ink);
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      padding: 0 12px;
      font-weight: 650;
      white-space: nowrap;
    }

    .selectbox {
      justify-content: space-between;
      overflow: hidden;
    }

    .status {
      color: #344250;
      font-size: 13px;
      justify-self: end;
    }

    .top-actions {
      display: flex;
      gap: 8px;
      align-items: center;
      flex-wrap: wrap;
    }

    .primary {
      border-color: #0f6ed6;
      background: var(--blue);
      color: #fff;
    }

    .notice {
      margin: 8px 12px;
      border-radius: 5px;
      background: #fff;
      border: 1px solid var(--line-soft);
      min-height: 38px;
      display: flex;
      align-items: center;
      padding: 0 12px;
      color: var(--muted);
      font-size: 13px;
    }

    .content {
      min-width: 0;
      min-height: 0;
      display: grid;
      grid-template-rows: auto minmax(0, 1fr);
      padding: 0 12px 12px;
      overflow: hidden;
    }

    .summary {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 8px;
      margin-bottom: 8px;
    }

    .summary-card {
      background: #fff;
      border: 1px solid var(--line-soft);
      border-radius: 8px 8px 0 0;
      overflow: hidden;
    }

    .summary-title {
      height: 42px;
      border-bottom: 1px solid var(--line-soft);
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 0 14px;
      font-size: 16px;
      font-weight: 750;
    }

    .summary-body {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 8px;
      padding: 10px 12px;
    }

    .mini strong {
      display: block;
      font-size: 18px;
      line-height: 1.15;
    }

    .mini span {
      display: block;
      color: var(--muted);
      font-size: 12px;
    }

    .table-shell {
      min-height: 0;
      background: #fff;
      border: 1px solid var(--line);
      overflow: hidden;
      display: grid;
      grid-template-rows: auto minmax(0, 1fr);
    }

    .table-actions {
      display: flex;
      justify-content: space-between;
      gap: 10px;
      padding: 8px;
      border-bottom: 1px solid var(--line);
      background: #fff;
    }

    .action-group {
      display: flex;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
    }

    .table-scroll {
      min-height: 0;
      overflow: auto;
    }

    table {
      width: 100%;
      min-width: 1320px;
      border-collapse: collapse;
      font-size: 13px;
    }

    th, td {
      border-right: 1px solid var(--line);
      border-bottom: 1px solid var(--line-soft);
      padding: 8px 10px;
      text-align: left;
      white-space: nowrap;
      vertical-align: middle;
    }

    th {
      position: sticky;
      top: 0;
      z-index: 1;
      background: #f6f8fb;
      color: #1f2c39;
      font-size: 12px;
      font-weight: 800;
      line-height: 1.2;
    }

    tbody tr:nth-child(even) { background: var(--row); }
    tbody tr:hover { background: #eaf3ff; }

    .name {
      color: #1264bf;
      font-weight: 750;
    }

    .pill {
      display: inline-flex;
      align-items: center;
      min-height: 22px;
      border-radius: 999px;
      border: 1px solid #9dd0ff;
      background: #edf7ff;
      color: #1264bf;
      padding: 0 8px;
      font-size: 12px;
      font-weight: 750;
    }

    .pill.ok { border-color: #9fd6c0; background: #e9f7f1; color: var(--green); }
    .pill.err { border-color: #f2a7b1; background: #fff0f2; color: var(--red); }
    .pill.warn { border-color: #f4d08f; background: #fff7df; color: var(--amber); }

    .row-action {
      min-height: 26px;
      border: 1px solid #b9c7d6;
      border-radius: 4px;
      background: #fff;
      color: var(--ink);
      font-size: 12px;
      font-weight: 700;
    }

    .empty {
      padding: 28px;
      color: var(--muted);
      font-weight: 700;
    }

    .toast {
      position: fixed;
      right: 18px;
      bottom: 18px;
      background: #1d2935;
      color: #fff;
      border-radius: 6px;
      padding: 12px 14px;
      font-weight: 750;
      opacity: 0;
      transform: translateY(14px);
      pointer-events: none;
      transition: .16s ease;
      box-shadow: 0 14px 34px rgba(0,0,0,.18);
    }

    .toast.show {
      opacity: 1;
      transform: translateY(0);
    }

    @media (max-width: 1050px) {
      .app { grid-template-columns: 1fr; }
      .sidebar { border-right: 0; border-bottom: 1px solid var(--line); }
      .nav { grid-template-columns: repeat(2, minmax(0, 1fr)); }
      .topbar { grid-template-columns: 1fr; }
      .status { justify-self: start; }
      .summary { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <div class="app">
    <aside class="sidebar">
      <div class="brand">
        <div class="mark">∞ HeartWork</div>
        <h1>配車マネージャ</h1>
      </div>
      <nav class="nav">
        <button class="active" type="button" data-view="dashboard"><span>▦</span><span>ダッシュボード</span><span class="badge" id="badgeIssues">2</span></button>
        <button type="button" data-view="schedule"><span>＋</span><span>予定登録</span></button>
        <button type="button" data-view="check"><span>✓</span><span>自動チェック</span></button>
        <button type="button" data-view="report"><span>▤</span><span>帳票出力</span></button>
      </nav>
    </aside>

    <main class="workspace">
      <header class="topbar">
        <div class="selectbox">
          <span id="viewTitle">ダッシュボード</span>
          <span>▼</span>
        </div>
        <div class="status" id="statusText">更新済み: 数秒前</div>
        <div class="top-actions">
          <button class="tool" type="button" id="addRecord">＋ 予定を追加</button>
          <button class="primary" type="button" id="publish">確認して確定(2)</button>
        </div>
      </header>

      <div class="notice" id="notice">配車実績、出勤記録、予定差異を自動照合しています</div>

      <section class="content">
        <div class="summary">
          <div class="summary-card">
            <div class="summary-title">▦ 予定</div>
            <div class="summary-body">
              <div class="mini"><strong id="planCount">4</strong><span>登録済み</span></div>
              <div class="mini"><strong>23日</strong><span>稼働基準</span></div>
              <div class="mini"><strong>21.8</strong><span>月末見込</span></div>
            </div>
          </div>
          <div class="summary-card">
            <div class="summary-title">▤ 実績</div>
            <div class="summary-body">
              <div class="mini"><strong id="fixedCount">2</strong><span>確定</span></div>
              <div class="mini"><strong id="inputCount">4</strong><span>入力済み</span></div>
              <div class="mini"><strong>5分</strong><span>確認時間</span></div>
            </div>
          </div>
          <div class="summary-card">
            <div class="summary-title">✓ 自動チェック</div>
            <div class="summary-body">
              <div class="mini"><strong id="issueCount">2</strong><span>要確認</span></div>
              <div class="mini"><strong>18:00</strong><span>自動実行</span></div>
              <div class="mini"><strong>4</strong><span>帳票</span></div>
            </div>
          </div>
        </div>

        <div class="table-shell">
          <div class="table-actions">
            <div class="action-group">
              <button class="tool" type="button" id="runCheck">自動チェック</button>
              <button class="tool" type="button" id="download">CSV出力</button>
            </div>
            <div class="action-group">
              <button class="tool" type="button" id="finishAll">本日の確認完了</button>
            </div>
          </div>
          <div class="table-scroll">
            <table>
              <thead>
                <tr>
                  <th>配車名 ↕</th>
                  <th>アクション</th>
                  <th>顧客</th>
                  <th>車両</th>
                  <th>予定ドライバー ↕</th>
                  <th>実績ドライバー ↕</th>
                  <th>出勤</th>
                  <th>消化金額 ↕</th>
                  <th>CPM(稼働単価) ↕</th>
                  <th>リーチ ↕</th>
                  <th>予算 ↕</th>
                  <th>結果 ↕</th>
                </tr>
              </thead>
              <tbody id="rows"></tbody>
            </table>
          </div>
        </div>
      </section>
    </main>
  </div>

  <div class="toast" id="toast">更新しました</div>

  <script>
    const records = [
      { name: "5/11 サコス標準", customer: "サコス株式会社", car: "車両 12", plan: "佐藤 健", actual: "佐藤 健", attendance: "打刻あり", fixed: true, reach: 14991 },
      { name: "5/11 東海リース", customer: "東海リース", car: "車両 18", plan: "鈴木 誠", actual: "鈴木 誠", attendance: "打刻なし", fixed: false, reach: 4448 },
      { name: "5/11 三和建材", customer: "三和建材", car: "車両 23", plan: "田中 亮", actual: "高橋 直人", attendance: "打刻あり", fixed: false, reach: 9530 },
      { name: "5/11 城南物流", customer: "城南物流", car: "車両 31", plan: "高橋 直人", actual: "高橋 直人", attendance: "打刻あり", fixed: true, reach: 6704 }
    ];

    let view = "dashboard";

    const viewConfig = {
      dashboard: ["ダッシュボード", "配車実績、出勤記録、予定差異を自動照合しています"],
      schedule: ["予定登録", "追加予定と未入力の配車を表示しています"],
      check: ["自動チェック", "打刻漏れと予定差異だけを表示しています"],
      report: ["帳票出力", "確定済みの実績と帳票出力対象を表示しています"]
    };

    function issue(record) {
      if (record.fixed) return null;
      if (record.attendance === "打刻なし") return "出勤打刻なし";
      if (record.plan !== record.actual) return "予定差異";
      return "確認待ち";
    }

    function status(record) {
      const i = issue(record);
      if (!i) return ["確定", "ok"];
      if (i === "確認待ち") return ["確認待ち", "warn"];
      return [i, "err"];
    }

    function visibleRecords() {
      if (view === "schedule") return records.filter(record => !record.fixed || record.actual === "未入力");
      if (view === "check") return records.filter(record => issue(record));
      if (view === "report") return records.filter(record => record.fixed);
      return records;
    }

    function toast(text) {
      const el = document.getElementById("toast");
      el.textContent = text;
      el.classList.add("show");
      window.setTimeout(() => el.classList.remove("show"), 1300);
    }

    function render() {
      const list = visibleRecords();
      document.getElementById("rows").innerHTML = list.length ? list.map(record => {
        const index = records.indexOf(record);
        const [label, cls] = status(record);
        return `
          <tr>
            <td><span class="name">${record.name}</span></td>
            <td><button class="row-action" data-fix="${index}" type="button">修正して確定</button></td>
            <td>${record.customer}</td>
            <td>${record.car}</td>
            <td>${record.plan}</td>
            <td>${record.actual}</td>
            <td><span class="pill ${cls}">${label}</span></td>
            <td>¥${(2200 + index * 89).toLocaleString()}</td>
            <td>¥${(144 + index * 93).toLocaleString()}</td>
            <td>${record.reach.toLocaleString()}</td>
            <td>配車セット予算...</td>
            <td>${record.fixed ? "実績確定" : label}</td>
          </tr>
        `;
      }).join("") : `<tr><td colspan="12"><div class="empty">表示できるデータはありません</div></td></tr>`;

      const issues = records.filter(record => issue(record));
      document.getElementById("planCount").textContent = records.length;
      document.getElementById("inputCount").textContent = records.filter(record => record.actual !== "未入力").length;
      document.getElementById("fixedCount").textContent = records.filter(record => record.fixed).length;
      document.getElementById("issueCount").textContent = issues.length;
      document.getElementById("badgeIssues").textContent = issues.length;
      document.getElementById("publish").textContent = `確認して確定(${issues.length})`;
      document.getElementById("viewTitle").textContent = viewConfig[view][0];
      document.getElementById("notice").textContent = viewConfig[view][1];

      document.querySelectorAll("[data-fix]").forEach(button => {
        button.addEventListener("click", () => {
          const record = records[Number(button.dataset.fix)];
          record.actual = record.plan;
          record.attendance = "打刻あり";
          record.fixed = true;
          render();
          toast("1件を確定しました");
        });
      });
    }

    function setView(nextView) {
      view = nextView;
      document.querySelectorAll("[data-view]").forEach(button => {
        button.classList.toggle("active", button.dataset.view === view);
      });
      render();
    }

    document.querySelectorAll("[data-view]").forEach(button => {
      button.addEventListener("click", () => setView(button.dataset.view));
    });

    document.getElementById("addRecord").addEventListener("click", () => {
      records.unshift({
        name: "5/12 追加配車",
        customer: "追加顧客",
        car: "車両 42",
        plan: "佐藤 健",
        actual: "未入力",
        attendance: "打刻なし",
        fixed: false,
        reach: 3180
      });
      setView("schedule");
      toast("予定を追加しました");
    });

    document.getElementById("runCheck").addEventListener("click", () => {
      setView("check");
      toast("自動チェックを実行しました");
    });

    document.getElementById("download").addEventListener("click", () => toast("CSVを出力しました"));

    function finishAll() {
      records.forEach(record => {
        record.actual = record.plan;
        record.attendance = "打刻あり";
        record.fixed = true;
      });
      render();
      toast("すべて確定しました");
    }

    document.getElementById("publish").addEventListener("click", finishAll);
    document.getElementById("finishAll").addEventListener("click", finishAll);

    render();
  </script>
</body>
</html>
