<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>ハートワーク 配車ワークスペース</title>
  <style>
    :root {
      --ink: #243042;
      --soft-ink: #5f6c7d;
      --muted: #9aa6b5;
      --line: #edf1f5;
      --panel: #ffffff;
      --page: #a8e3dc;
      --mint: #61cbc6;
      --mint-dark: #43b6bd;
      --blue: #69b8df;
      --green: #4fc79c;
      --yellow: #ffd54a;
      --orange: #ff9f43;
      --red: #f26372;
      --shadow: 0 28px 70px rgba(57, 139, 151, .22);
      --card-shadow: 0 18px 42px rgba(52, 84, 111, .11);
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      color: var(--ink);
      background:
        radial-gradient(circle at 18% 12%, rgba(255,255,255,.72), transparent 24%),
        linear-gradient(145deg, #b9ebe4, #9fe0da);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      line-height: 1.45;
      padding: 34px;
    }

    button,
    input,
    select {
      font: inherit;
    }

    button {
      cursor: pointer;
    }

    .frame {
      max-width: 1320px;
      min-height: calc(100vh - 68px);
      margin: 0 auto;
      border-radius: 34px;
      background: rgba(255,255,255,.96);
      box-shadow: var(--shadow);
      overflow: hidden;
      display: grid;
      grid-template-columns: 260px minmax(0, 1fr);
      border: 10px solid rgba(255,255,255,.9);
    }

    .side {
      background: linear-gradient(180deg, #66cbc5, #57aee0);
      padding: 38px 26px;
      color: #fff;
      display: flex;
      flex-direction: column;
      gap: 34px;
      position: relative;
    }

    .side::after {
      content: "";
      position: absolute;
      top: 190px;
      left: 0;
      width: 100%;
      height: 78px;
      background: #fff;
      border-radius: 34px 0 0 34px;
      opacity: .98;
    }

    .logo {
      position: relative;
      z-index: 1;
      font-size: 26px;
      font-weight: 950;
      letter-spacing: 0;
    }

    .logo span {
      color: var(--yellow);
    }

    .nav {
      position: relative;
      z-index: 1;
      display: grid;
      gap: 18px;
      margin-top: 26px;
    }

    .nav button {
      border: 0;
      min-height: 48px;
      border-radius: 24px;
      padding: 0 18px;
      background: transparent;
      color: #fff;
      display: flex;
      align-items: center;
      gap: 12px;
      font-size: 15px;
      font-weight: 900;
      text-align: left;
    }

    .nav button.active {
      background: #fff;
      color: #48b9bd;
      box-shadow: 0 16px 30px rgba(55, 126, 154, .18);
    }

    .icon {
      width: 28px;
      height: 28px;
      display: grid;
      place-items: center;
      border-radius: 10px;
      background: rgba(255,255,255,.18);
      font-size: 14px;
    }

    .nav button.active .icon {
      background: #ecfbf8;
      color: #48b9bd;
    }

    .logout {
      position: relative;
      z-index: 1;
      margin-top: auto;
      width: 126px;
      min-height: 42px;
      border: 0;
      border-radius: 999px;
      background: rgba(30, 118, 160, .26);
      color: #fff;
      font-weight: 900;
    }

    .main {
      min-width: 0;
      padding: 38px 34px 34px;
      background:
        linear-gradient(180deg, rgba(255,255,255,.95), rgba(250,252,255,.95));
    }

    .topbar {
      display: grid;
      grid-template-columns: minmax(0, 1fr) 310px 54px;
      align-items: center;
      gap: 18px;
      margin-bottom: 28px;
    }

    .tabs {
      display: flex;
      gap: 34px;
      align-items: center;
      overflow-x: auto;
    }

    .tabs button {
      border: 0;
      background: transparent;
      color: #57bebd;
      font-weight: 950;
      padding: 8px 0;
      white-space: nowrap;
      position: relative;
    }

    .tabs button.active::after {
      content: "";
      position: absolute;
      left: 0;
      bottom: 0;
      width: 28px;
      height: 4px;
      border-radius: 999px;
      background: #57bebd;
    }

    .search {
      height: 52px;
      border-radius: 22px;
      background: #f8fafb;
      border: 0;
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 0 18px;
      color: var(--muted);
      box-shadow: inset 0 0 0 1px rgba(232,237,242,.65);
    }

    .search input {
      border: 0;
      outline: 0;
      background: transparent;
      width: 100%;
      color: var(--ink);
    }

    .bell {
      width: 54px;
      height: 54px;
      border: 0;
      border-radius: 18px;
      background: #5cc9c6;
      color: #fff;
      font-size: 20px;
      box-shadow: 0 16px 30px rgba(92, 201, 198, .32);
      position: relative;
    }

    .bell::after {
      content: "";
      position: absolute;
      top: 9px;
      right: 9px;
      width: 9px;
      height: 9px;
      border-radius: 50%;
      background: var(--orange);
    }

    .hero-grid {
      display: grid;
      grid-template-columns: minmax(0, 1fr) 250px;
      gap: 20px;
      margin-bottom: 24px;
    }

    .trend {
      min-height: 250px;
      border-radius: 30px;
      padding: 30px 32px;
      color: #fff;
      background:
        radial-gradient(circle at 78% 16%, rgba(255,255,255,.22), transparent 20%),
        linear-gradient(135deg, #5fcac4, #6dbbe4);
      box-shadow: var(--card-shadow);
      position: relative;
      overflow: hidden;
      display: grid;
      grid-template-columns: 210px minmax(0, 1fr);
      gap: 10px;
    }

    .trend h1 {
      margin: 0 0 10px;
      color: var(--yellow);
      font-size: 15px;
      font-weight: 950;
    }

    .big-number {
      font-size: 96px;
      line-height: .85;
      font-weight: 950;
      letter-spacing: 0;
    }

    .big-number span {
      font-size: 15px;
      vertical-align: middle;
      margin-left: 6px;
    }

    .trend small {
      display: block;
      margin-top: 18px;
      font-size: 14px;
      font-weight: 800;
      color: rgba(255,255,255,.9);
    }

    .wave {
      min-height: 170px;
      align-self: center;
      position: relative;
    }

    .wave svg {
      width: 100%;
      height: 100%;
      min-height: 170px;
    }

    .calories {
      border-radius: 28px;
      background: #fff;
      box-shadow: var(--card-shadow);
      padding: 26px 22px;
      display: grid;
      align-content: center;
      justify-items: center;
      gap: 12px;
    }

    .ring {
      width: 142px;
      height: 142px;
      border-radius: 50%;
      background:
        conic-gradient(#5ecbc5 0 72%, #edf2f5 72% 100%);
      display: grid;
      place-items: center;
    }

    .ring-inner {
      width: 104px;
      height: 104px;
      border-radius: 50%;
      background: #fff;
      display: grid;
      place-items: center;
      text-align: center;
      color: var(--mint-dark);
      font-weight: 950;
    }

    .ring-inner strong {
      display: block;
      font-size: 28px;
      line-height: 1;
    }

    .ring-inner span {
      display: block;
      color: var(--muted);
      font-size: 11px;
      margin-top: 4px;
    }

    .section-head {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      margin: 0 0 18px;
    }

    .section-head h2 {
      margin: 0;
      font-size: 22px;
      letter-spacing: 0;
    }

    .day-tabs {
      display: flex;
      gap: 14px;
    }

    .day-tabs button {
      min-width: 104px;
      height: 42px;
      border: 0;
      border-radius: 16px;
      background: #f7f9fb;
      color: #5ebfbd;
      font-weight: 950;
    }

    .day-tabs button.active {
      background: #5ecbc5;
      color: #fff;
      box-shadow: 0 12px 22px rgba(94, 203, 197, .28);
    }

    .content-grid {
      display: grid;
      grid-template-columns: minmax(0, 1fr) 330px;
      gap: 20px;
      align-items: start;
    }

    .stack {
      display: grid;
      gap: 18px;
    }

    .card {
      border-radius: 28px;
      background: #fff;
      box-shadow: var(--card-shadow);
      padding: 24px;
    }

    .quick {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      align-items: center;
      gap: 18px;
      background: #f7f8fa;
    }

    .quick h3,
    .card h3 {
      margin: 0;
      font-size: 18px;
      line-height: 1.3;
    }

    .quick-actions {
      display: flex;
      gap: 14px;
      align-items: center;
      flex-wrap: wrap;
    }

    .square {
      width: 62px;
      height: 62px;
      border: 0;
      border-radius: 16px;
      background: #5ecbc5;
      color: #fff;
      font-size: 24px;
      font-weight: 950;
      box-shadow: 0 12px 20px rgba(94, 203, 197, .24);
    }

    .square.yellow {
      background: var(--yellow);
      color: #243042;
      box-shadow: 0 12px 20px rgba(255, 213, 74, .26);
    }

    .route-list {
      display: grid;
      gap: 14px;
    }

    .route {
      border-radius: 22px;
      background: #fff;
      border: 1px solid #f0f3f6;
      padding: 16px;
      display: grid;
      grid-template-columns: 54px minmax(0, 1fr) auto;
      gap: 14px;
      align-items: center;
      transition: .16s ease;
    }

    .route:hover {
      transform: translateY(-2px);
      box-shadow: 0 14px 28px rgba(52, 84, 111, .1);
    }

    .avatar {
      width: 54px;
      height: 54px;
      border-radius: 18px;
      display: grid;
      place-items: center;
      color: #fff;
      font-weight: 950;
      background: linear-gradient(135deg, #59c7c2, #65b4e6);
    }

    .route strong {
      display: block;
      font-size: 16px;
    }

    .route span {
      display: block;
      color: var(--muted);
      font-size: 13px;
      font-weight: 700;
      margin-top: 4px;
    }

    .pill {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-width: 74px;
      min-height: 30px;
      padding: 0 12px;
      border-radius: 999px;
      font-size: 12px;
      font-weight: 950;
      background: #eff8f7;
      color: #4ab9b5;
      white-space: nowrap;
    }

    .pill.ok { background: #e8f8f0; color: #28a772; }
    .pill.warn { background: #fff5d9; color: #bd7a16; }
    .pill.err { background: #fff0f2; color: #d83a4a; }

    .group-list {
      display: grid;
      gap: 18px;
    }

    .member {
      display: grid;
      grid-template-columns: 54px minmax(0, 1fr) 34px;
      gap: 14px;
      align-items: center;
    }

    .face {
      width: 54px;
      height: 54px;
      border-radius: 18px;
      background: linear-gradient(135deg, #d8eff2, #72c8d8);
      display: grid;
      place-items: center;
      font-weight: 950;
      color: #fff;
    }

    .member strong {
      display: block;
      font-size: 16px;
    }

    .member span {
      display: block;
      color: var(--muted);
      font-size: 13px;
      font-weight: 700;
      margin-top: 3px;
    }

    .badge {
      width: 30px;
      height: 30px;
      border-radius: 50%;
      display: grid;
      place-items: center;
      background: #5ecbc5;
      color: #fff;
      font-size: 12px;
      font-weight: 950;
    }

    .phone {
      border-radius: 30px;
      background: linear-gradient(180deg, #52c4c0, #63b6df);
      padding: 18px;
      color: #fff;
      box-shadow: var(--card-shadow);
    }

    .phone h3 {
      margin: 0 0 14px;
    }

    .field {
      display: grid;
      gap: 7px;
      margin-bottom: 12px;
    }

    label {
      font-size: 12px;
      font-weight: 950;
      color: rgba(255,255,255,.84);
    }

    select,
    input {
      width: 100%;
      min-height: 44px;
      border: 0;
      border-radius: 16px;
      padding: 0 13px;
      background: rgba(255,255,255,.94);
      color: var(--ink);
      outline: 0;
    }

    .primary {
      width: 100%;
      min-height: 46px;
      border: 0;
      border-radius: 16px;
      background: #fff;
      color: #46b9bd;
      font-weight: 950;
      box-shadow: 0 12px 24px rgba(32, 117, 151, .18);
    }

    .subview {
      display: none;
    }

    .subview.active {
      display: block;
    }

    .toast {
      position: fixed;
      right: 40px;
      bottom: 36px;
      border-radius: 18px;
      padding: 14px 18px;
      background: #243042;
      color: #fff;
      font-weight: 950;
      box-shadow: 0 20px 48px rgba(36, 48, 66, .22);
      transform: translateY(18px);
      opacity: 0;
      pointer-events: none;
      transition: .18s ease;
    }

    .toast.show {
      opacity: 1;
      transform: translateY(0);
    }

    @media (max-width: 1100px) {
      body {
        padding: 16px;
      }

      .frame {
        min-height: auto;
        grid-template-columns: 1fr;
      }

      .side {
        min-height: auto;
        border-radius: 24px;
      }

      .side::after {
        display: none;
      }

      .nav {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }

      .hero-grid,
      .content-grid {
        grid-template-columns: 1fr;
      }
    }

    @media (max-width: 720px) {
      .main {
        padding: 22px 16px;
      }

      .topbar,
      .trend,
      .quick,
      .route {
        grid-template-columns: 1fr;
      }

      .tabs {
        gap: 22px;
      }

      .day-tabs {
        width: 100%;
      }

      .day-tabs button {
        min-width: 0;
        flex: 1;
      }

      .section-head {
        align-items: flex-start;
        flex-direction: column;
      }
    }
  </style>
</head>
<body>
  <div class="frame">
    <aside class="side">
      <div class="logo"><span>Heart</span>Work</div>
      <nav class="nav">
        <button class="active" type="button" data-view="dashboard"><span class="icon">◆</span>ダッシュボード</button>
        <button type="button" data-view="schedule"><span class="icon">＋</span>予定登録</button>
        <button type="button" data-view="check"><span class="icon">✓</span>自動チェック</button>
        <button type="button" data-view="report"><span class="icon">□</span>帳票出力</button>
      </nav>
      <button class="logout" type="button" id="finishAll">確認完了</button>
    </aside>

    <main class="main">
      <div class="topbar">
        <div class="tabs">
          <button class="active" type="button">今日</button>
          <button type="button">予定</button>
          <button type="button">車両</button>
          <button type="button">勤怠</button>
        </div>
        <div class="search">
          <span>⌕</span>
          <input type="search" value="" placeholder="検索">
        </div>
        <button class="bell" type="button">●</button>
      </div>

      <section id="dashboard" class="subview active">
        <div class="hero-grid">
          <div class="trend">
            <div>
              <h1>月末稼働見込み</h1>
              <div class="big-number">21.8<span>日</span></div>
              <small>本日の配車 <span id="todayCount">4</span>件 / 要確認 <span id="issueCount">2</span>件</small>
            </div>
            <div class="wave">
              <svg viewBox="0 0 420 180" fill="none" aria-hidden="true">
                <path d="M0 105C45 46 86 155 128 84C170 12 183 13 209 90C236 166 277 159 303 88C330 15 369 58 420 105" stroke="rgba(255,255,255,.92)" stroke-width="7" stroke-linecap="round"/>
                <path d="M0 128C45 70 87 158 128 105C170 52 183 55 209 117C236 178 277 168 303 115C331 61 373 82 420 128" stroke="rgba(255,255,255,.35)" stroke-width="3" stroke-dasharray="6 6"/>
                <circle cx="128" cy="84" r="9" fill="#fff"/>
                <circle cx="303" cy="88" r="9" fill="#fff"/>
              </svg>
            </div>
          </div>
          <div class="calories">
            <div class="ring">
              <div class="ring-inner">
                <strong id="fixedCount">2</strong>
                <span>確定済み</span>
              </div>
            </div>
            <span class="pill">23日基準</span>
          </div>
        </div>

        <div class="section-head">
          <h2>今日の配車</h2>
          <div class="day-tabs">
            <button class="active" type="button">月</button>
            <button type="button">火</button>
            <button type="button">水</button>
          </div>
        </div>

        <div class="content-grid">
          <div class="stack">
            <div class="card quick">
              <div>
                <h3>すぐ使う操作</h3>
              </div>
              <div class="quick-actions">
                <button class="square" type="button" data-view-jump="schedule">＋</button>
                <button class="square" type="button" data-view-jump="check">✓</button>
                <button class="square yellow" type="button" id="quickReport">□</button>
              </div>
            </div>
            <div class="card">
              <div class="route-list" id="routeList"></div>
            </div>
          </div>

          <div class="stack">
            <div class="card">
              <h3 style="margin-bottom:18px">本社確認</h3>
              <div class="group-list" id="issueList"></div>
            </div>
            <div class="phone">
              <h3>現場入力</h3>
              <div class="field">
                <label for="target">対象予定</label>
                <select id="target"></select>
              </div>
              <div class="field">
                <label for="actual">実績ドライバー</label>
                <select id="actual">
                  <option>佐藤 健</option>
                  <option>鈴木 誠</option>
                  <option>田中 亮</option>
                  <option>高橋 直人</option>
                  <option>未入力</option>
                </select>
              </div>
              <div class="field">
                <label for="attendance">出勤打刻</label>
                <select id="attendance">
                  <option>打刻あり</option>
                  <option>打刻なし</option>
                </select>
              </div>
              <button class="primary" type="button" id="saveActual">送信</button>
            </div>
          </div>
        </div>
      </section>

      <section id="schedule" class="subview">
        <div class="content-grid">
          <div class="card">
            <h3 style="margin-bottom:18px">翌日予定登録</h3>
            <div class="field">
              <label style="color:var(--muted)" for="date">稼働日</label>
              <input id="date" type="date" value="2026-05-12">
            </div>
            <div class="field">
              <label style="color:var(--muted)" for="customer">顧客</label>
              <select id="customer">
                <option>サコス株式会社</option>
                <option>東海リース</option>
                <option>三和建材</option>
                <option>城南物流</option>
              </select>
            </div>
            <div class="field">
              <label style="color:var(--muted)" for="car">車両</label>
              <select id="car">
                <option>車両 12</option>
                <option>車両 18</option>
                <option>車両 23</option>
                <option>車両 31</option>
              </select>
            </div>
            <div class="field">
              <label style="color:var(--muted)" for="driver">ドライバー</label>
              <select id="driver">
                <option>佐藤 健</option>
                <option>鈴木 誠</option>
                <option>田中 亮</option>
                <option>高橋 直人</option>
              </select>
            </div>
            <button class="primary" type="button" id="addSchedule" style="background:#5ecbc5;color:#fff">予定を追加</button>
          </div>
          <div class="card">
            <h3 style="margin-bottom:18px">登録済み予定</h3>
            <div class="route-list" id="scheduleList"></div>
          </div>
        </div>
      </section>

      <section id="check" class="subview">
        <div class="card">
          <div class="section-head">
            <h2>自動チェック</h2>
            <button class="primary" type="button" id="fixOne" style="width:auto;padding:0 18px">先頭の不備を修正</button>
          </div>
          <div class="group-list" id="checkList"></div>
        </div>
      </section>

      <section id="report" class="subview">
        <div class="card">
          <div class="section-head">
            <h2>帳票出力</h2>
            <button class="primary" type="button" id="saveReport" style="width:auto;padding:0 18px">ドライブへ保存</button>
          </div>
          <div class="content-grid">
            <div class="route-list">
              <div class="route"><div class="avatar">顧</div><div><strong>顧客軸配車表</strong><span>顧客ごとの月次配車</span></div><span class="pill">PDF</span></div>
              <div class="route"><div class="avatar">車</div><div><strong>車両軸配車表</strong><span>車両ごとの稼働状況</span></div><span class="pill">PDF</span></div>
              <div class="route"><div class="avatar">勤</div><div><strong>勤怠表レポート</strong><span>出勤入力から自動作成</span></div><span class="pill">PDF</span></div>
              <div class="route"><div class="avatar">週</div><div><strong>週次経営レポート</strong><span>23日稼働の見込み</span></div><span class="pill">PDF</span></div>
            </div>
            <div class="calories">
              <div class="ring">
                <div class="ring-inner">
                  <strong>4</strong>
                  <span>出力可能</span>
                </div>
              </div>
              <span class="pill">Googleドライブ</span>
            </div>
          </div>
        </div>
      </section>
    </main>
  </div>

  <div class="toast" id="toast">更新しました</div>

  <script>
    const records = [
      { date: "2026-05-11", customer: "サコス株式会社", car: "車両 12", plan: "佐藤 健", actual: "佐藤 健", attendance: "打刻あり", fixed: true },
      { date: "2026-05-11", customer: "東海リース", car: "車両 18", plan: "鈴木 誠", actual: "鈴木 誠", attendance: "打刻なし", fixed: false },
      { date: "2026-05-11", customer: "三和建材", car: "車両 23", plan: "田中 亮", actual: "高橋 直人", attendance: "打刻あり", fixed: false },
      { date: "2026-05-11", customer: "城南物流", car: "車両 31", plan: "高橋 直人", actual: "高橋 直人", attendance: "打刻あり", fixed: true }
    ];

    function issues() {
      return records.map((record, index) => {
        if (record.fixed) return null;
        if (record.actual !== "未入力" && record.attendance === "打刻なし") {
          return { index, name: record.actual, title: "出勤打刻なし", detail: `${record.customer} / ${record.car}` };
        }
        if (record.actual !== "未入力" && record.plan !== record.actual) {
          return { index, name: record.actual, title: "予定と実績の差異", detail: `${record.customer} / 予定 ${record.plan}` };
        }
        return { index, name: record.plan, title: "実績未入力", detail: `${record.customer} / ${record.car}` };
      }).filter(Boolean);
    }

    function status(record) {
      if (record.fixed) return ["確定", "ok"];
      if (record.attendance === "打刻なし" || record.actual === "未入力") return ["要確認", "err"];
      if (record.plan !== record.actual) return ["差異", "warn"];
      return ["確認待ち", ""];
    }

    function initials(name) {
      return name.replace(/\s/g, "").slice(0, 1);
    }

    function toast(text) {
      const el = document.getElementById("toast");
      el.textContent = text;
      el.classList.add("show");
      window.setTimeout(() => el.classList.remove("show"), 1300);
    }

    function show(id) {
      document.querySelectorAll(".subview").forEach(view => view.classList.remove("active"));
      document.querySelectorAll("[data-view]").forEach(btn => btn.classList.remove("active"));
      document.getElementById(id).classList.add("active");
      document.querySelector(`[data-view="${id}"]`)?.classList.add("active");
    }

    function renderRoutes() {
      const html = records.map((record, index) => {
        const [label, cls] = status(record);
        return `
          <div class="route">
            <div class="avatar">${initials(record.plan)}</div>
            <div>
              <strong>${record.customer}</strong>
              <span>${record.car} / 予定 ${record.plan} / 実績 ${record.actual}</span>
            </div>
            <button class="pill ${cls}" type="button" data-fix="${index}">${label}</button>
          </div>
        `;
      }).join("");
      document.getElementById("routeList").innerHTML = html;
      document.getElementById("scheduleList").innerHTML = records.map(record => `
        <div class="route">
          <div class="avatar">${initials(record.plan)}</div>
          <div>
            <strong>${record.customer}</strong>
            <span>${record.date} / ${record.car} / ${record.plan}</span>
          </div>
          <span class="pill ok">登録済み</span>
        </div>
      `).join("");
      document.querySelectorAll("[data-fix]").forEach(button => {
        button.addEventListener("click", () => {
          const record = records[Number(button.dataset.fix)];
          record.actual = record.plan;
          record.attendance = "打刻あり";
          record.fixed = true;
          renderAll();
          toast("確定しました");
        });
      });
    }

    function renderIssues() {
      const list = issues();
      const html = list.length ? list.map((item, index) => `
        <div class="member">
          <div class="face">${initials(item.name)}</div>
          <div>
            <strong>${item.title}</strong>
            <span>${item.detail}</span>
          </div>
          <div class="badge">${index + 1}</div>
        </div>
      `).join("") : `
        <div class="member">
          <div class="face">✓</div>
          <div>
            <strong>不一致なし</strong>
            <span>本日の実績を確定できます</span>
          </div>
          <div class="badge">0</div>
        </div>
      `;
      document.getElementById("issueList").innerHTML = html;
      document.getElementById("checkList").innerHTML = html;
      document.getElementById("issueCount").textContent = list.length;
      document.getElementById("todayCount").textContent = records.length;
      document.getElementById("fixedCount").textContent = records.filter(record => record.fixed).length;
    }

    function renderTarget() {
      document.getElementById("target").innerHTML = records.map((record, index) => `
        <option value="${index}">${record.customer} / ${record.car}</option>
      `).join("");
    }

    function renderAll() {
      renderRoutes();
      renderIssues();
      renderTarget();
    }

    document.querySelectorAll("[data-view]").forEach(button => {
      button.addEventListener("click", () => show(button.dataset.view));
    });

    document.querySelectorAll("[data-view-jump]").forEach(button => {
      button.addEventListener("click", () => show(button.dataset.viewJump));
    });

    document.getElementById("addSchedule").addEventListener("click", () => {
      records.unshift({
        date: document.getElementById("date").value,
        customer: document.getElementById("customer").value,
        car: document.getElementById("car").value,
        plan: document.getElementById("driver").value,
        actual: "未入力",
        attendance: "打刻なし",
        fixed: false
      });
      renderAll();
      show("dashboard");
      toast("予定を追加しました");
    });

    document.getElementById("saveActual").addEventListener("click", () => {
      const record = records[Number(document.getElementById("target").value)];
      record.actual = document.getElementById("actual").value;
      record.attendance = document.getElementById("attendance").value;
      record.fixed = false;
      renderAll();
      toast("送信しました");
    });

    document.getElementById("fixOne").addEventListener("click", () => {
      const item = issues()[0];
      if (!item) return toast("修正対象はありません");
      records[item.index].actual = records[item.index].plan;
      records[item.index].attendance = "打刻あり";
      records[item.index].fixed = true;
      renderAll();
      toast("修正しました");
    });

    document.getElementById("finishAll").addEventListener("click", () => {
      records.forEach(record => {
        record.actual = record.plan;
        record.attendance = "打刻あり";
        record.fixed = true;
      });
      renderAll();
      toast("確認完了にしました");
    });

    document.getElementById("saveReport").addEventListener("click", () => toast("ドライブへ保存しました"));
    document.getElementById("quickReport").addEventListener("click", () => show("report"));

    renderAll();
  </script>
</body>
</html>
